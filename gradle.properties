# Project-wide Gradle settings.

# Disable Gradle's native integration
org.gradle.native=false

# Low-level network fixes for 'getsockopt' timeout:
# 1. Force IPv4
# 2. Disable SNI
# 3. Disable HTTP Keep-Alive (forces fresh sockets)
# 4. Disable system proxy detection
# 5. Treat all hosts as direct (No Proxy)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djava.net.preferIPv4Stack=true -Djsse.enableSNIExtension=false -Djava.net.useSystemProxies=false -Dhttp.keepAlive=false -Dhttps.keepAlive=false -Dhttp.nonProxyHosts="*"

# Disable background features that can interfere with the network stack
org.gradle.daemon=false
org.gradle.vfs.watch=false

# Connection timeouts
systemProp.org.gradle.internal.http.connectionTimeout=10000
systemProp.org.gradle.internal.http.socketTimeout=10000

# AndroidX settings
android.useAndroidX=true
android.nonTransitiveRClass=false
